# Irodori TTS API - CPU版
# docker compose -f docker-compose.cpu.yml up

services:
  cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpu
    image: irodori-tts-api:cpu
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      MODEL_DEVICE: cpu
      CODEC_DEVICE: cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
